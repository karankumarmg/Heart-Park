name: heart_park
description: Heart Park - A Premium online Dating App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.8
  cloud_firestore: ^4.15.8
  firebase_storage: ^11.6.9

  # UI & Animations
  google_fonts: ^6.2.1
  animated_text_kit: ^4.2.2
  flutter_card_swiper: ^7.0.0
  lottie: ^3.1.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0

  # State Management
  provider: ^6.1.2
  get: ^4.6.6

  # Image & Media
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1

  # Chat & Realtime
  intl: ^0.19.0

  # Utilities
  uuid: ^4.3.3
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  url_launcher: ^6.2.6
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
  fonts:
    - family: Playfair
      fonts:
        - asset: assets/fonts/PlayfairDisplay-Regular.ttf
        - asset: assets/fonts/PlayfairDisplay-Bold.ttf
          weight: 700
